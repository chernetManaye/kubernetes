apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo-deployment
  labels:
    app: demo
    version: v1

spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
      version: v1
    template:
      metadata:
        labels:
          app: demo
          version: v1
        spec:
          containers:
            - name: demo-container
              image: demo:v1
              ports:
                - containerPort: 8080
