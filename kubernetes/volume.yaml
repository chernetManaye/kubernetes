apiVersion: v1
kind: PersistentVolume

metadata:
  name: mongodb-pv

spec:
  capacity:
    storage: 5Gi

  accessModes:
    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  hostPath:
    path: /mnt/mongodb-data

---
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: mongodb-pvc
  namespace: application

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 5Gi
